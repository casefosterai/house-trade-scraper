name: Scrape House trades

# When this workflow runs.
on:
  # Cron runs in UTC. Twice a day: 11:00 UTC (~7am ET) and 21:00 UTC (~5pm ET).
  # Cron syntax: "minute hour day-of-month month day-of-week"
  schedule:
    - cron: "0 11 * * *"
    - cron: "0 21 * * *"

  # Lets you trigger a run manually from the Actions tab on GitHub.
  workflow_dispatch:

# Permissions the workflow needs. We need write access to push the
# updated trades.json back to the repo.
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 1: scrape new filings into trades.json + seen_filings.json + failed_filings.json
      - name: Run scraper
        run: python scripts/fetch_trades.py

      # Step 2: compute returns into returns.json + update price_cache.json
      # We always run this even if no new filings showed up — it's cheap (most
      # prices are cached) and current prices change daily, which affects open
      # positions' mark-to-market returns.
      - name: Compute returns
        run: python scripts/compute_returns.py

      # Step 3: commit any changes to the JSON files.
      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage all the data files the scripts may have modified.
          git add data/trades.json data/seen_filings.json data/failed_filings.json data/returns.json data/price_cache.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          # Build a useful commit message.
          NEW_TRADE_COUNT=$(python -c "import json; print(len(json.load(open('data/trades.json'))))")
          NEW_SEEN_COUNT=$(python -c "import json; print(len(json.load(open('data/seen_filings.json'))))")

          git commit -m "Auto-update: ${NEW_TRADE_COUNT} trades across ${NEW_SEEN_COUNT} filings"
          git push
